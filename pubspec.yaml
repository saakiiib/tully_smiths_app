name: tully_smith
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  get_storage: ^2.1.1
  http: ^1.6.0
  google_fonts: ^8.0.2
  table_calendar: ^3.2.0
  shared_preferences: ^2.3.2
  camera: ^0.10.5
  geolocator: ^11.0.0
  image_picker: ^1.0.7
  dropdown_search: ^5.0.6
  file_picker: ^8.1.2
  url_launcher: ^6.3.1
  http_parser: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon/